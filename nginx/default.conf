# Rate-limit zone used on the contact endpoint. Declared at http level (this
# file is included from /etc/nginx/conf.d/). 10m state ~= 160k unique IPs.
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

# Gzip text responses. Static assets that benefit most from compression.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Don't leak nginx version in error pages / Server header.
    server_tokens off;

    # TODO: terminate TLS in production (separate listen 443 ssl block +
    # redirect here) and re-enable HSTS. HSTS without HTTPS would brick the
    # local dev environment.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    large_client_header_buffers 4 16k;
    client_header_buffer_size 4k;
    client_max_body_size 16m;

    # Handle Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Tight rate limit on the contact form. burst=3 nodelay lets legitimate
    # users retry a typo without hitting the limit immediately.
    location = /api/contact {
        limit_req zone=contact burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
